name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      ECR_REGISTRY: YOUR_AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/github-actions-deploy-role

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build frontend image
        run: |
          docker build -t $ECR_REGISTRY/taskflow-frontend:latest ./frontend
          docker push $ECR_REGISTRY/taskflow-frontend:latest

      - name: Build backend image
        run: |
          docker build -t $ECR_REGISTRY/taskflow-backend:latest ./backend
          docker push $ECR_REGISTRY/taskflow-backend:latest

      - name: Build worker image
        run: |
          docker build -t $ECR_REGISTRY/taskflow-worker:latest ./worker
          docker push $ECR_REGISTRY/taskflow-worker:latest

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name taskflow-prod-cluster --region $AWS_REGION

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/worker-deployment.yaml
          kubectl apply -f k8s/hpa-backend.yaml
          kubectl apply -f k8s/ingress.yaml